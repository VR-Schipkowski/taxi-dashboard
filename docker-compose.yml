services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:9092", "--list" ]

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /opt/kafka/bin/kafka-topics.sh
      - --create
      - --if-not-exists
      - --topic
      - taxi-locations
      - --bootstrap-server
      - kafka:9092
      - --partitions
      - "1"
      - --replication-factor
      - "1"

  provider:
    build: ./provider
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - "/home/geschen/Desktop/big_data/data:/taxi-data:ro"
    command: --data-dir /taxi-data --bootstrap-servers kafka:9092 --speed-factor 1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
  flink-jobmanager:
    image: flink:1.20-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 5
      
  flink-taskmanager:
    image: flink:1.20-java11
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
      
  flink-job:
    build: ./flink-job
    container_name: flink-job
    depends_on:
      flink-jobmanager:
        condition: service_healthy 
      flink-taskmanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: >
      bash -c "
      sleep 10 &&
      /opt/flink/bin/flink run 
      --jobmanager flink-jobmanager:8081 
      --detached 
      /opt/flink/usrlib/taxi-processor-1.0.jar
      "
  
  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5