services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_BYTES: 3221225472
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:9092", "--list" ]

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >-
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic taxi-locations --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic taxi-processed --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic taxi-speeding --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic taxi-area-violations --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1

  provider:
    build: ./provider
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
#      - "./provider/data/test/taxi-data:/taxi-data:ro"
      - "./provider/data/release/taxi_log_2008_by_id:/taxi-data:ro"
    command: --data-dir /taxi-data --bootstrap-servers kafka:9092 --speed-factor 1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  kafka-backend:
    build: ./kafka-backend
    container_name: kafka-backend
    restart: on-failure
    ports:
      - "5001:5001"
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis-init:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "5173:5173"
    depends_on:
      - kafka-backend

  flink-jobmanager:
    image: flink:1.20-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081" ]
      interval: 5s
      timeout: 3s
      retries: 5

  flink-taskmanager:
    image: flink:1.20-java11
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"

  flink-job:
    build: ./flink-job
    container_name: flink-job
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    command: >
      bash -c " sleep 10 && /opt/flink/bin/flink run --jobmanager flink-jobmanager:8081 --detached /opt/flink/usrlib/taxi-processor-1.0.jar "

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-init:
    image: redis:7.2
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: [ "redis-cli", "-h", "redis", "FLUSHALL" ]
    restart: "no"
